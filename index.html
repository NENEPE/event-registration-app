<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Registration Form</h1>
            <p>Please fill out the form below to register</p>
            <hr>
        </div>

        <form id="regForm">
            <div class="type">
                <label for="fname">Full name:</label>
                <input type="text" id="name" placeholder="Your Full Name">
            </div>

            <div class="type">
                <label for="email">Email:</label>
                <input type="text" id="email" placeholder="example@email.com">
                <!-- I didn't use type="email" because it has its own validation that overlapped mine -->
            </div>
            <div class="type">
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" min="1" max="99">
            </div>

            <div class="type">
                <label for="field">Choose a field:</label>
                <select id="field" name="field">
                    <option value="">None</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Game Development">Game Development</option>
                    <option value="Marketing">Marketing</option>
                    <option value="Game Design">Game Design</option>
                    <option value="Aviation Management">Aviation Management</option>
                </select>
            </div>

            <div class="type">
                <input type="checkbox" id="terms" name="terms">
                <label for="terms">I agree to the terms and conditions</label>
            </div>
            
            <div class="type">
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">I want to receive the newsletter</label>
            </div>

            <button type="submit">Register</button>
        </form>

        <div class ="message" id="message"></div>
    </div>

    <div class="container" id="participants">
            <h1>Participants</h1>
            <h3></h3>
            <h2>Search:</h2>
            <input type="text" id="search" placeholder="Enter Full Name or Email">
            <button id="searchBtn">Search</button>
            <button id="clearBtn">Clear</button>
            <hr>
            <ol></ol>
    <script src="script.js"></script>
</body>
</html>
