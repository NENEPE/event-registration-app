<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Registration Form</h1>
            <p>Please fill out the form below to register</p>
            <hr>
        </div>

        <form id="regForm">
            <div class="type">
                <label for="fname">Full name:</label>
                <input type="text" id="name" placeholder="Your Full Name">
            </div>

            <div class="type">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="example@email.com">
            </div>
            <div class="type">
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" min="1" max="99">
            </div>

            <div class="type">
                <label for="field">Choose a field:</label>
                <select id="field" name="field">
                    <option value="CPS">Computer Science</option>
                    <option value="GAM">Game Development</option>
                    <option value="MKT">Marketing</option>
                    <option value="GDM">Game Design</option>
                    <option value="AVM">Aviation Management</option>
                </select>
            </div>

            <div class="type">
                <input type="checkbox" id="terms" name="terms">
                <label for="terms">I agree to the terms and conditions</label>
            </div>
            
            <div class="type">
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">I want to receive the newsletter</label>
            </div>

            <button type="submit">Register</button>
        </form>

        <div class ="message" id="message"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
